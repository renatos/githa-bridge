name: Deploy to Host

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Copy files to Host
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ubuntu
        key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        source: "dist/*,package.json,package-lock.json"
        target: "/opt/githa/githa-bridge"
        rm: true

    - name: Restart Service via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ubuntu
        key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        script: |
          # Carrega o NVM e seleciona a versão
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 20 || nvm use default
          export PATH=$PATH:$(npm config get prefix)/bin
          
          cd /opt/githa/githa-bridge
          
          # Gera o arquivo .env automaticamente
          cat <<EOF > .env
          PORT=3000
          BRIDGE_API_KEY=${{ secrets.GITHA_BRIDGE_API_KEY }}
          EOF
          
          npm install --production
          # Reinicia com PM2
          pm2 restart githa-bridge --update-env || pm2 start dist/server.js --name githa-bridge
