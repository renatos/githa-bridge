name: Deploy to Host

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Prepare folder permissions
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ubuntu
        key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        script: |
          if [ -d "/opt/githa/githa-bridge" ]; then
            sudo chown -R ubuntu:ubuntu /opt/githa/githa-bridge
          fi

    - name: Copy files to Host
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ubuntu
        key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        source: "dist/*,package.json,package-lock.json"
        target: "/opt/githa/githa-bridge"
        rm: true

    - name: Restart Service via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ubuntu
        key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        script: |
          # Garante que a pasta existe e pertence ao usuário openclaw
          sudo mkdir -p /opt/githa/githa-bridge
          sudo chown -R openclaw:openclaw /opt/githa/githa-bridge
          
          # Executa o restante como usuário openclaw
          sudo -u openclaw bash -c '
            export NVM_DIR="/home/openclaw/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            
            cd /opt/githa/githa-bridge
            
            # Gera o arquivo .env de forma limpa
            printf "PORT=3000\nBRIDGE_API_KEY=%s\n" "${{ secrets.GITHA_BRIDGE_API_KEY }}" > .env
            
            npm install --production
            # Reinicia no PM2 do usuário openclaw
            pm2 restart githa-bridge --update-env || pm2 start dist/server.js --name githa-bridge
          '
